<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trade Cuberz v4</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#050816,#091121,#111a35);
color:#fff;
padding:20px;
}

.container{
max-width:1150px;
margin:auto;
}

.card{
background:#11192d;
padding:28px;
border-radius:22px;
margin-bottom:22px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.logo{
font-size:48px;
font-weight:800;
color:#18f58b;
}

.sub{
margin-top:6px;
color:#8ea3d8;
}

.tg{
background:#2f78ff;
padding:14px 24px;
border-radius:14px;
text-decoration:none;
color:#fff;
font-weight:700;
}

label{
display:block;
margin-bottom:8px;
color:#8ea3d8;
font-size:15px;
}

input,select{
width:100%;
padding:16px;
font-size:22px;
border:none;
outline:none;
border-radius:14px;
background:#222c42;
color:#fff;
margin-bottom:15px;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
-webkit-appearance:none;
margin:0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.05);
}

th{
font-size:14px;
color:#9ab1e7;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:18px;
}

.box{
background:#0b1328;
padding:18px;
border-radius:18px;
text-align:center;
}

.big{
font-size:32px;
font-weight:800;
margin-bottom:8px;
}

.green{color:#18f58b;}
.gold{color:#ffd84d;}
.blue{color:#38b6ff;}

.doneRow{
background:rgba(24,245,139,.08);
}

button{
padding:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#2f78ff,#8a2dff);
width:100%;
}

.footer{
text-align:center;
color:#7d8cb8;
padding:12px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Професійний торговий калькулятор</div>
</div>

<a class="tg" href="https://t.me/+JxZLoij59XBmNTBi" target="_blank">Telegram</a>
</div>
</div>

<div class="card">

<label>Валюта</label>
<select id="currency" onchange="renderCalc();buildPlan();">
<option value="$">USD Долар</option>
<option value="₴">UAH Гривня</option>
<option value="€">EUR Євро</option>
<option value="zł">PLN Злотий</option>
</select>

<label>Баланс</label>
<input type="number" id="sum" value="900" oninput="renderCalc()">

<table>
<thead>
<tr>
<th>СТУПІНЬ</th>
<th>%</th>
<th>СУМА</th>
</tr>
</thead>

<tbody id="calcRows"></tbody>
</table>

</div>

<div class="card">

<h2 style="margin-bottom:18px;">Планувальник цілей</h2>

<label>Початкова сума</label>
<input type="number" id="start" value="900">

<label>Цільова сума</label>
<input type="number" id="goal" value="5000">

<label>Кількість днів</label>
<input type="number" id="days" value="30">

<button onclick="buildPlan()">Розрахувати план</button>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Щоденний %</div>
</div>

<div class="box">
<div class="big blue" id="done">0</div>
<div>Виконано</div>
</div>

<div class="box">
<div class="big gold" id="left">0</div>
<div>Залишилось</div>
</div>

<div class="box">
<div class="big gold" id="prog">0%</div>
<div>Прогрес</div>
</div>

</div>

<table>
<thead>
<tr>
<th>ДЕНЬ</th>
<th>%</th>
<th>ОЧІКУВАНА СУМА</th>
<th>✔</th>
</tr>
</thead>

<tbody id="planRows"></tbody>
</table>

</div>

<div class="footer">
Trade Cuberz v4 © 2026
</div>

</div>

<script>
const levels=[1,2,5,10];

let totalDays=0;
let doneDays=0;
let rate=0;

function cur(){
return document.getElementById("currency").value;
}

function renderCalc(){

let s=parseFloat(document.getElementById("sum").value)||0;
let html="";

for(let i=0;i<levels.length;i++){

let val=(s*levels[i]/100).toFixed(2);

html+=`
<tr>
<td class="green">${i+1} ступінь</td>
<td>${levels[i]}%</td>
<td class="gold">${cur()}${val}</td>
</tr>
`;
}

document.getElementById("calcRows").innerHTML=html;
}

function buildPlan(){

let start=parseFloat(document.getElementById("start").value)||0;
let goal=parseFloat(document.getElementById("goal").value)||0;
totalDays=parseInt(document.getElementById("days").value)||0;
doneDays=0;

if(start<=0||goal<=0||totalDays<=0)return;

rate=(Math.pow(goal/start,1/totalDays)-1)*100;

document.getElementById("daily").innerText=rate.toFixed(3)+"%";

let bal=start;
let html="";

for(let i=1;i<=totalDays;i++){

bal=bal*(1+rate/100);

html+=`
<tr id="row${i}">
<td>День ${i}</td>
<td>${rate.toFixed(3)}%</td>
<td class="gold">${cur()}${bal.toFixed(2)}</td>
<td><input type="checkbox" onchange="markDay(${i},this)"></td>
</tr>
`;
}

document.getElementById("planRows").innerHTML=html;

updateStats();
}

function markDay(day,box){

let row=document.getElementById("row"+day);

if(box.checked){
row.classList.add("doneRow");
doneDays++;
}else{
row.classList.remove("doneRow");
doneDays--;
if(doneDays<0)doneDays=0;
}

updateStats();
}

function updateStats(){

let left=totalDays-doneDays;
let prog=(doneDays/totalDays*100)||0;

document.getElementById("done").innerText=doneDays;
document.getElementById("left").innerText=left;
document.getElementById("prog").innerText=prog.toFixed(1)+"%";
}

renderCalc();
buildPlan();
</script>

</body>
</html>
