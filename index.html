<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Cuberz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

:root{
--bg:#081225;
--card:#11192d;
--card2:#1f2b45;
--text:#ffffff;
--muted:#8ea3d8;
--line:rgba(255,255,255,.06);
--warnBg:#2b1720;
--warnText:#ff6a6a;
}

body.light{
--bg:#f3f6fc;
--card:#ffffff;
--card2:#ffffff;
--text:#16233d;
--muted:#5b6e92;
--line:rgba(0,0,0,.08);
--warnBg:#fff1f1;
--warnText:#d32f2f;
}

body{
background:var(--bg);
color:var(--text);
padding:20px;
transition:.25s;
}

.container{max-width:1200px;margin:auto}

.card{
background:var(--card);
padding:25px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.25)
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap
}

.logo{
font-size:42px;
font-weight:900;
background:linear-gradient(90deg,#18f58b,#2f78ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:var(--muted);
margin-top:8px
}

.topBtns{
display:flex;
gap:10px;
flex-wrap:wrap
}

.telegram,.themeBtn,.excelBtn,.pathBtn{
padding:14px 22px;
border:none;
border-radius:14px;
color:#fff;
font-weight:700;
cursor:pointer;
text-decoration:none;
font-size:16px;
}

.telegram{background:#2f78ff}
.themeBtn{background:#6b7fb3}
.excelBtn{background:#16a34a}
.pathBtn{background:#ff8a00}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-top:18px
}

label{
display:block;
margin-bottom:6px;
color:var(--muted)
}

input,select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--card2);
color:var(--text);
font-size:18px;
outline:none;
}

body.light input,
body.light select{
border:1px solid #d9e2f2;
box-shadow:0 4px 12px rgba(0,0,0,.04);
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-top:18px
}

button.main,button.gray{
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:700;
color:#fff;
cursor:pointer
}

button.main{
background:linear-gradient(90deg,#2f78ff,#8a2dff)
}

button.gray{
background:#2b3a60
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-top:20px
}

.box{
background:var(--bg);
padding:18px;
border-radius:16px;
text-align:center
}

.big{
font-size:30px;
font-weight:800;
margin-bottom:8px
}

.green{color:#18f58b}
.gold{color:#ffd84d}
.blue{color:#38b6ff}

body.light .green{color:#0b8f47}
body.light .gold{color:#c98a00}
body.light .blue{color:#0066d6}

.progressWrap{
margin-top:18px;
height:16px;
background:var(--card2);
border-radius:50px;
overflow:hidden
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#18f58b,#2f78ff,#8a2dff);
transition:.5s
}

.progressText{
margin-top:8px;
color:var(--muted);
font-size:14px
}

.warn{
margin-top:14px;
padding:14px;
border-radius:14px;
background:var(--warnBg);
color:var(--warnText);
font-weight:700
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse
}

th,td{
padding:14px;
border-bottom:1px solid var(--line);
text-align:left
}

th{color:var(--muted)}

.smallInput{
width:180px;
padding:10px;
font-size:16px
}

/* RESULT ZONE */
.resultZone{
display:none;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:18px;
}

#historyBox{display:none}

footer{
margin-top:25px;
text-align:center;
color:var(--muted);
font-size:16px
}

@media(max-width:700px){

body{
padding:12px;
}

.card{
padding:16px;
border-radius:18px;
}

.top{
display:block;
}

.logo{
font-size:30px;
}

.sub{
font-size:15px;
margin-top:6px;
}

.topBtns{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:12px;
}

.topBtns button,
.topBtns a{
padding:10px;
font-size:14px;
text-align:center;
}

.grid{
grid-template-columns:1fr;
gap:10px;
}

.actions{
grid-template-columns:1fr;
gap:10px;
}

.stats{
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
padding:14px;
}

.big{
font-size:24px;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
font-size:14px;
}

.smallInput{
width:140px;
}

.resultZone{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Професійний торговий калькулятор</div>
</div>

<div class="topBtns">
<button class="themeBtn" onclick="toggleTheme()">🌙 / ☀️</button>
<a class="telegram" href="https://t.me/+JxZLoij59XBmNTBi" target="_blank">Telegram</a>
</div>
</div>

<div class="grid">

<div>
<label>Брокер</label>
<select id="broker" onchange="renderAll();saveAll();">
<option value="pocket">Pocket Option</option>
<option value="binarium">Binarium</option>
</select>
</div>

<div>
<label>Валюта</label>
<select id="currency" onchange="renderAll();saveAll();">
<option value="₴">UAH ₴</option>
<option value="$">USD $</option>
<option value="€">EUR €</option>
<option value="zł">PLN zł</option>
</select>
</div>

<div>
<label>Початковий баланс</label>
<input type="number" id="start" placeholder="Наприклад: 4000">
</div>

<div>
<label>Ціль</label>
<input type="number" id="goal" placeholder="Наприклад: 10000">
</div>

<div>
<label>Кількість днів</label>
<input type="number" id="days" placeholder="Наприклад: 20">
</div>

<div>
<label>Payout %</label>
<input type="number" id="payout" placeholder="Наприклад: 80">
</div>

</div>

<div class="actions">
<button class="main" onclick="createPlan()">Створити план</button>
<button class="gray" onclick="resetAll()">Очистити</button>
</div>

<div class="stats">
<div class="box"><div class="big green" id="daily">0%</div><div>Денний %</div></div>
<div class="box"><div class="big blue" id="profitDay">0</div><div>Прибуток / день</div></div>
<div class="box"><div class="big gold" id="nowbal">0</div><div>Баланс</div></div>
<div class="box"><div class="big gold" id="left">0</div><div>Лишилось днів</div></div>
</div>

<div class="progressWrap">
<div class="progress" id="bar"></div>
</div>
<div class="progressText" id="progText">0% до цілі</div>

<div id="warnBox"></div>

<table>
<thead>
<tr>
<th>Ступінь</th>
<th>%</th>
<th>Сума</th>
<th>Угод до плану</th>
</tr>
</thead>
<tbody id="stepsRows"></tbody>
</table>

<table>
<thead>
<tr>
<th>День</th>
<th>Очікувано</th>
<th>Поточний баланс / збиток</th>
<th>✔</th>
</tr>
</thead>
<tbody id="planRows"></tbody>
</table>

<!-- RESULT ZONE -->
<div class="resultZone" id="resultZone">
<button class="pathBtn" onclick="toggleHistory()">📈 Мій шлях</button>
<button class="excelBtn" onclick="exportCSV()">📄 Excel</button>
</div>

<div id="historyBox">
<table>
<thead>
<tr>
<th>День</th>
<th>Що ввів</th>
<th>Баланс після дня</th>
</tr>
</thead>
<tbody id="historyRows"></tbody>
</table>
</div>

<footer>
Trade Cuberz © 2026
</footer>

</div>
</div>

<script>
let current=0,target=0,totalDays=0,doneDays=0,rate=0;
let history=[];
const levels=[1,2,5,10];

function c(){return currency.value}
function roundInt(n){return Number((n+1e-9).toFixed(0))}

function minTrade(){
let b=broker.value;
let cur=c();

if(cur==="₴"){
if(b==="pocket") return 50;
if(b==="binarium") return 25;
}
if(cur==="$") return 1;
if(cur==="€") return 1;
if(cur==="zł") return 5;
return 1;
}

function createPlan(){
current=Number(start.value)||0;
target=Number(goal.value)||0;
totalDays=parseInt(days.value)||0;
doneDays=0;
history=[];
renderAll();
saveAll();
}

function renderAll(){
if(current<=0||target<=0||totalDays<=0)return;

let leftDays=Math.max(totalDays-doneDays,1);
rate=(Math.pow(target/current,1/leftDays)-1)*100;

let profit=current*(rate/100);

daily.innerText=rate.toFixed(2)+"%";
profitDay.innerText=c()+roundInt(profit);
nowbal.innerText=c()+roundInt(current);
left.innerText=totalDays-doneDays;

let progress=(current/target)*100;
if(progress>100)progress=100;

bar.style.width=progress+"%";
progText.innerText=progress.toFixed(1)+"% до цілі";

renderSteps();
renderPlan();
renderHistory();
saveAll();
}

function renderSteps(){
let payoutVal=(Number(payout.value)||80)/100;
let min=minTrade();
let dayGoal=current*(rate/100);

let html="";
let warning=false;

for(let i=0;i<levels.length;i++){
let raw=current*(levels[i]/100);
let stake=Math.max(raw,min);

if(raw<min)warning=true;

let profit=stake*payoutVal;
let trades=Math.ceil(dayGoal/profit);

html+=`
<tr>
<td>${i+1}</td>
<td>${levels[i]}%</td>
<td class="gold">${c()}${roundInt(stake)} ${raw<min?'(мін.)':''}</td>
<td class="green">${trades}</td>
</tr>
`;
}

stepsRows.innerHTML=html;

warnBox.innerHTML=
warning?'<div class="warn">Баланс малий для точних ставок %. Використано мінімальні угоди брокера.</div>':'';
}

function renderPlan(){
let html="";
let bal=current;

for(let i=doneDays+1;i<=totalDays;i++){

bal=bal*(1+rate/100);

html+=`
<tr>
<td>День ${i}</td>
<td class="gold">${c()}${roundInt(bal)}</td>
<td><input class="smallInput" id="real${i}" placeholder="4200 або -200"></td>
<td><input type="checkbox" onchange="finishDay(${i},this)"></td>
</tr>
`;
}

planRows.innerHTML=html;
}

function finishDay(day,box){

if(!box.checked)return;

let val=document.getElementById("real"+day).value.trim();

if(val===""){
box.checked=false;
return;
}

let num=Number(val);

if(isNaN(num)){
box.checked=false;
return;
}

if(num<0){
current=current+num;
}else{
current=num;
}

if(current<1)current=1;

doneDays++;

history.push({
day:day,
input:val,
balance:roundInt(current)
});

renderAll();
}

function toggleHistory(){
historyBox.style.display=
(historyBox.style.display==="none"||historyBox.style.display==="")?
"block":"none";
}

function renderHistory(){

let html="";

for(let i=0;i<history.length;i++){
html+=`
<tr>
<td>${history[i].day}</td>
<td>${history[i].input}</td>
<td>${c()}${history[i].balance}</td>
</tr>
`;
}

historyRows.innerHTML=html;

resultZone.style.display = history.length>0 ? "grid" : "none";
}

function saveAll(){
localStorage.setItem("tradeRealPro",JSON.stringify({
broker:broker.value,
currency:currency.value,
start:start.value,
goal:goal.value,
days:days.value,
payout:payout.value,
current,target,totalDays,doneDays,history
}));
}

function loadAll(){
let d=JSON.parse(localStorage.getItem("tradeRealPro")||"{}");

broker.value=d.broker||"pocket";
currency.value=d.currency||"₴";
start.value=d.start||"";
goal.value=d.goal||"";
days.value=d.days||"";
payout.value=d.payout||"80";

current=d.current||0;
target=d.target||0;
totalDays=d.totalDays||0;
doneDays=d.doneDays||0;
history=d.history||[];

if(current>0&&target>0&&totalDays>0){
renderAll();
}else{
renderHistory();
}
}

function resetAll(){
localStorage.removeItem("tradeRealPro");
location.reload();
}

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("themeMode",
document.body.classList.contains("light")?"light":"dark");
}

function loadTheme(){
if(localStorage.getItem("themeMode")==="light"){
document.body.classList.add("light");
}
}

function exportCSV(){

let rows="День,Що ввів,Баланс після дня\r\n";

for(let i=0;i<history.length;i++){
rows+=`${history[i].day},${history[i].input},${history[i].balance}\r\n`;
}

let csv="\uFEFF"+rows;

let blob=new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="trade-cuberz-history.csv";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

loadTheme();
loadAll();
</script>

</body>
</html>
