<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRADE CUBERZ</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:
radial-gradient(circle at top right,#1c2c68 0%,transparent 30%),
radial-gradient(circle at left,#10203e 0%,transparent 25%),
linear-gradient(135deg,#050913,#091423,#0d1f38);
color:#fff;
min-height:100vh;
padding:18px;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(14px);
border-radius:26px;
padding:26px;
box-shadow:0 0 40px rgba(0,0,0,.35);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:24px;
}

.logo{
font-size:44px;
font-weight:900;
letter-spacing:1px;
background:linear-gradient(90deg,#f0b90b,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
margin-top:8px;
font-size:18px;
color:#8ea3d8;
}

.topRight{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.badge{
padding:10px 16px;
border-radius:14px;
background:#111f3f;
color:#f0b90b;
font-weight:800;
}

.telegram{
padding:12px 18px;
border-radius:14px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
text-decoration:none;
color:#fff;
font-weight:800;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

label{
display:block;
margin-bottom:7px;
font-size:14px;
color:#8ea3d8;
}

input,select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:#101c36;
color:#fff;
font-size:16px;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-top:18px;
}

button{
padding:15px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:900;
cursor:pointer;
color:#fff;
}

.mainBtn{
background:linear-gradient(90deg,#f0b90b,#f59e0b);
color:#111;
}

.altBtn{
background:#17274b;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:22px;
}

.box{
background:#0d1934;
padding:20px;
border-radius:18px;
border:1px solid rgba(255,255,255,.04);
}

.big{
font-size:30px;
font-weight:900;
margin-bottom:6px;
}

.gold{color:#f0b90b;}
.green{color:#22c55e;}
.blue{color:#38bdf8;}
.purple{color:#a78bfa;}

.progressWrap{
margin-top:18px;
height:16px;
background:#101f3d;
border-radius:40px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#f0b90b,#38bdf8,#8b5cf6);
transition:.6s;
}

.progressText{
margin-top:8px;
font-size:13px;
color:#8ea3d8;
}

.section{
margin-top:26px;
margin-bottom:10px;
font-size:20px;
font-weight:900;
}

.dayList{
display:grid;
gap:12px;
}

.dayCard{
background:#0c1730;
padding:18px;
border-radius:18px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.smallInput{
padding:12px;
margin-top:8px;
}

.dayBtn{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:900;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:#fff;
cursor:pointer;
}

footer{
margin-top:28px;
text-align:center;
color:#6f84b8;
font-size:15px;
padding:12px;
}

@media(max-width:600px){
.logo{font-size:30px}
.sub{font-size:15px}
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Crypto Futuristic Trading Planner</div>
</div>

<div class="topRight">
<div class="badge" id="rankBox">Beginner Trader</div>
<a class="telegram" href="https://t.me/+JxZLoij59XBmNTBi" target="_blank">Telegram</a>
</div>
</div>

<div class="grid">

<div>
<label>Брокер</label>
<select id="broker">
<option value="pocket">Pocket Option</option>
<option value="binarium">Binarium</option>
</select>
</div>

<div>
<label>Валюта</label>
<select id="currency">
<option value="₴">UAH ₴</option>
<option value="$">USD $</option>
<option value="€">EUR €</option>
<option value="zł">PLN zł</option>
</select>
</div>

<div>
<label>Початковий баланс</label>
<input type="number" id="start">
</div>

<div>
<label>Ціль</label>
<input type="number" id="goal">
</div>

<div>
<label>Кількість днів</label>
<input type="number" id="days">
</div>

<div>
<label>Режим</label>
<select id="mode">
<option value="safe">Safe</option>
<option value="normal" selected>Normal</option>
<option value="aggressive">Aggressive</option>
</select>
</div>

</div>

<div class="actions">
<button class="mainBtn" onclick="createPlan()">Створити план</button>
<button class="altBtn" onclick="resetAll()">Очистити</button>
</div>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Денний ріст</div>
</div>

<div class="box">
<div class="big blue" id="profit">0</div>
<div>Прибуток / день</div>
</div>

<div class="box">
<div class="big gold" id="balance">0</div>
<div>Баланс</div>
</div>

<div class="box">
<div class="big purple" id="streak">0</div>
<div>Streak</div>
</div>

</div>

<div class="progressWrap">
<div class="progress" id="bar"></div>
</div>

<div class="progressText" id="progText">0% до цілі</div>

<div class="section">План по днях</div>
<div class="dayList" id="planRows"></div>

<footer>
TRADE CUBERZ
</footer>

</div>
</div>

<script>
let current=0,target=0,totalDays=0,doneDays=0,rate=0,streakDays=0;

function c(){
return currency.value;
}

function save(){
localStorage.setItem("v3wow",JSON.stringify({
broker:broker.value,
currency:currency.value,
start:start.value,
goal:goal.value,
days:days.value,
mode:mode.value,
current,
doneDays,
streakDays
}));
}

function load(){
let d=JSON.parse(localStorage.getItem("v3wow")||"{}");

broker.value=d.broker||"pocket";
currency.value=d.currency||"₴";
start.value=d.start||"";
goal.value=d.goal||"";
days.value=d.days||"";
mode.value=d.mode||"normal";
current=d.current||0;
doneDays=d.doneDays||0;
streakDays=d.streakDays||0;

if(current>0){
target=Number(goal.value);
totalDays=Number(days.value);
renderAll();
}
}

function resetAll(){
localStorage.clear();
location.reload();
}

function createPlan(){

current=Number(start.value)||0;
target=Number(goal.value)||0;
totalDays=Number(days.value)||0;
doneDays=0;
streakDays=0;

renderAll();
save();
}

function renderAll(){

if(current<=0||target<=0||totalDays<=0)return;

let left=Math.max(totalDays-doneDays,1);

rate=(Math.pow(target/current,1/left)-1)*100;

if(mode.value==="safe") rate*=0.8;
if(mode.value==="aggressive") rate*=1.2;

let profitDay=current*(rate/100);

daily.innerText=rate.toFixed(2)+"%";
profit.innerText=c()+Math.round(profitDay);
balance.innerText=c()+Math.round(current);
streak.innerText=streakDays+"🔥";

let progress=(current/target)*100;
if(progress>100)progress=100;

bar.style.width=progress+"%";
progText.innerText=progress.toFixed(1)+"% до цілі";

if(progress<30) rankBox.innerText="Beginner Trader";
else if(progress<70) rankBox.innerText="Rising Bull";
else rankBox.innerText="Profit Beast";

renderPlan();
save();
}

function renderPlan(){

let html="";
let bal=current;

for(let i=doneDays+1;i<=totalDays;i++){

bal=bal*(1+rate/100);

html+=`
<div class="dayCard">

<div class="row">
<div><b>День ${i}</b></div>
<div class="gold">${c()}${Math.round(bal)}</div>
</div>

<input class="smallInput" id="real${i}" placeholder="Баланс або -збиток">

<button class="dayBtn" onclick="finishDay(${i})">Закрити день</button>

</div>
`;
}

planRows.innerHTML=html;
}

function finishDay(day){

let val=document.getElementById("real"+day).value.trim();
if(val==="") return;

let num=Number(val);
if(isNaN(num)) return;

if(num>=current) streakDays++;
else streakDays=0;

if(num<0){
current=current+num;
}else{
current=num;
}

if(current<1) current=1;

doneDays++;

renderAll();
}

load();
</script>

</body>
</html>
