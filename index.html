<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trade Cuberz 2.0</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#07111f,#0e1b34,#11192d);
min-height:100vh;
padding:20px;
color:#fff;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:rgba(255,255,255,.04);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:25px;
box-shadow:0 0 30px rgba(0,0,0,.35);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.logo{
font-size:42px;
font-weight:900;
background:linear-gradient(90deg,#18f58b,#2f78ff,#a52dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#90a4d4;
margin-top:8px;
}

.telegram{
text-decoration:none;
padding:14px 24px;
border-radius:14px;
font-weight:700;
background:linear-gradient(90deg,#2f78ff,#6a4dff);
color:#fff;
transition:.3s;
}

.telegram:hover{
transform:translateY(-2px);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

label{
display:block;
margin-bottom:7px;
color:#9db0da;
font-size:14px;
}

input,select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:#182642;
color:#fff;
font-size:17px;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-top:18px;
}

button{
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:800;
cursor:pointer;
color:#fff;
transition:.3s;
}

.btn1{
background:linear-gradient(90deg,#2f78ff,#8a2dff);
}

.btn2{
background:#1f2f52;
}

button:hover{
transform:translateY(-2px);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:22px;
}

.box{
background:#0e1830;
padding:20px;
border-radius:18px;
text-align:center;
border:1px solid rgba(255,255,255,.05);
}

.big{
font-size:30px;
font-weight:900;
margin-bottom:8px;
}

.green{color:#18f58b;}
.gold{color:#ffd84d;}
.blue{color:#46c2ff;}

.progressWrap{
margin-top:20px;
background:#13203d;
height:18px;
border-radius:50px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#18f58b,#2f78ff);
transition:.7s;
}

.progressText{
margin-top:8px;
color:#9cb0da;
font-size:14px;
}

.table{
margin-top:20px;
display:grid;
gap:12px;
}

.dayCard{
background:#101a32;
padding:18px;
border-radius:18px;
border:1px solid rgba(255,255,255,.05);
}

.dayTop{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:12px;
}

.small{
padding:12px;
margin-top:10px;
}

footer{
margin-top:25px;
text-align:center;
color:#7f93be;
font-size:14px;
}

@media(max-width:600px){
.logo{font-size:32px}
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Premium Trading Calculator</div>
</div>

<a class="telegram" target="_blank"
href="https://t.me/+JxZLoij59XBmNTBi">Telegram</a>
</div>

<div class="grid">

<div>
<label>Початковий баланс</label>
<input type="number" id="start">
</div>

<div>
<label>Ціль</label>
<input type="number" id="goal">
</div>

<div>
<label>Днів</label>
<input type="number" id="days">
</div>

<div>
<label>Payout %</label>
<input type="number" id="payout" value="80">
</div>

</div>

<div class="actions">
<button class="btn1" onclick="calc()">Створити план</button>
<button class="btn2" onclick="resetAll()">Очистити</button>
</div>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Денний ріст</div>
</div>

<div class="box">
<div class="big blue" id="profit">0</div>
<div>Прибуток / день</div>
</div>

<div class="box">
<div class="big gold" id="balance">0</div>
<div>Баланс</div>
</div>

<div class="box">
<div class="big gold" id="goalLeft">0</div>
<div>До цілі</div>
</div>

</div>

<div class="progressWrap">
<div class="progress" id="bar"></div>
</div>

<div class="progressText" id="progText">0% до цілі</div>

<div class="table" id="daysBox"></div>

<footer>
Trade Cuberz 2.0
</footer>

</div>
</div>

<script>
function save(){
localStorage.setItem("tradeData",JSON.stringify({
start:start.value,
goal:goal.value,
days:days.value,
payout:payout.value
}));
}

function load(){
let d=JSON.parse(localStorage.getItem("tradeData")||"{}");
start.value=d.start||"";
goal.value=d.goal||"";
days.value=d.days||"";
payout.value=d.payout||80;
}

function resetAll(){
localStorage.clear();
location.reload();
}

function calc(){

save();

let s=Number(start.value);
let g=Number(goal.value);
let d=Number(days.value);

if(!s||!g||!d)return;

let rate=(Math.pow(g/s,1/d)-1)*100;
let dayProfit=s*(rate/100);

daily.innerText=rate.toFixed(2)+"%";
profit.innerText=Math.round(dayProfit);
balance.innerText=Math.round(s);
goalLeft.innerText=Math.round(g-s);

let percent=((s/g)*100);
if(percent>100)percent=100;

bar.style.width=percent+"%";
progText.innerText=percent.toFixed(1)+"% до цілі";

let html="";
let bal=s;

for(let i=1;i<=d;i++){

bal=bal*(1+rate/100);

html+=`
<div class="dayCard">
<div class="dayTop">
<div><b>День ${i}</b></div>
<div class="gold">${Math.round(bal)}</div>
</div>

<input class="small" placeholder="Введи реальний баланс">

</div>
`;
}

daysBox.innerHTML=html;
}

load();
</script>

</body>
</html>
