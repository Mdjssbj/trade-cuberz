.container{

.card{

.sub{

}

.grid{
display:grid;
grid-template-columns:2fr 1fr;

}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

label{
display:block;
margin-bottom:10px;
color:#90a6db;
font-size:15px;
}

input{
width:100%;
padding:18px;
font-size:34px;
border:none;
outline:none;
border-radius:16px;
background:#222c42;
color:#fff;
margin-bottom:15px;
appearance:none;
-moz-appearance:textfield;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
-webkit-appearance:none;

}

.quick{

}

.quick button{

.b1{background:#2f78ff;}
.b2{background:#20b14d;}
.b3{background:#8a2dff;}

.scheme{

}

.scheme h3{

margin-bottom:14px;
}

.scheme p{

color:#9ab1e7;

}

.bar{

}

table{
width:100%;
border-collapse:collapse;

}

th,td{
padding:18px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.05);

th{
color:#9ab1e7;

.green{color:#18f58b;}

.footer{

</head>

<body>

<div class="container">

<div class="card">

<div>

<div class="sub">–Я—А–Њ—Д–µ—Б—Ц–є–љ–Є–є —В–Њ—А–≥–Њ–≤–Є–є –Ї–∞–ї—М–Ї—Г–ї—П—В–Њ—А</div>
</div>

<a class="tg" href="https://t.me/+JxZLoij59XBmNTBi" target="_blank">Telegram</a>
</div>
</div>

<div class="card">

<div class="grid">

<div>
<label>–Ч–∞–≥–∞–ї—М–љ–∞ —Б—Г–Љ–∞</label>

<input type="number" id="sum" placeholder="–Т–≤–µ–і—Ц—В—М —Б–≤—Ц–є –±–∞–ї–∞–љ—Б $" value="1000" oninput="render()">

<div class="quick">
<button class="b1" onclick="setVal(100)">$100</button>
<button class="b2" onclick="setVal(500)">$500</button>

</div>
</div>

</div>

</div>

<table>
<thead>
<tr>

</div>

Trade Cuberz ¬© 2026

<script>
const perc=[1,1.5,3.5,8,20,60];

function setVal(v){
document.getElementById("sum").value=v;
render();
}

function render(){

let s=parseFloat(document.getElementById("sum").value)||0;

let html="";

for(let i=0;i<perc.length;i++){

let val=(s*perc[i]/100).toFixed(2);

html+=`
<tr>
<td class="green">${i+1} —Б—В—Г–њ—Ц–љ—М</td>
<td>${perc[i]}%</td>
<td class="gold">$${val}</td>
</tr>
`;
}

document.getElementById("rows").innerHTML=html;
}

render();
</script>

</body>
</html>
