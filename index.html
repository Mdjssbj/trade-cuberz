<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRADE CUBERZ CLOUD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#07111f,#0d1730,#132247);
color:#fff;
min-height:100vh;
padding:20px;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:rgba(255,255,255,.04);
padding:28px;
border-radius:24px;
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(12px);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.logo{
font-size:46px;
font-weight:900;
background:linear-gradient(90deg,#18f58b,#2f78ff,#9f2dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#8ea3d8;
margin-top:8px;
font-size:20px;
}

.user{
display:flex;
align-items:center;
gap:12px;
}

.user img{
width:46px;
height:46px;
border-radius:50%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

label{
display:block;
margin-bottom:7px;
font-size:14px;
color:#9db0da;
}

input,select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:#192746;
color:#fff;
font-size:17px;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-top:18px;
}

button{
padding:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:900;
cursor:pointer;
color:#fff;
}

.mainBtn{
background:linear-gradient(90deg,#2f78ff,#982cff);
}

.grayBtn{
background:#24345f;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:24px;
}

.box{
background:#09173a;
padding:22px;
border-radius:20px;
text-align:center;
}

.big{
font-size:34px;
font-weight:900;
margin-bottom:8px;
}

.green{color:#18f58b;}
.blue{color:#3ec3ff;}
.gold{color:#ffd84d;}

.progressWrap{
margin-top:20px;
height:18px;
background:#10204a;
border-radius:30px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#18f58b,#2f78ff);
transition:.5s;
}

.progressText{
margin-top:10px;
font-size:14px;
color:#9db0da;
}

.section{
margin-top:26px;
font-size:22px;
font-weight:900;
}

.dayList{
display:grid;
gap:12px;
margin-top:14px;
}

.dayCard{
background:#0e1a39;
padding:18px;
border-radius:18px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.smallInput{
padding:12px;
margin-top:8px;
}

.dayBtn{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
font-weight:900;
background:linear-gradient(90deg,#2f78ff,#982cff);
color:#fff;
cursor:pointer;
}

footer{
margin-top:35px;
text-align:center;
color:#7f93be;
font-size:26px;
padding:20px;
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Cloud Trading Calculator</div>
</div>

<div class="user" id="userBox">
Завантаження...
</div>
</div>

<div class="grid">

<div>
<label>Брокер</label>
<select id="broker">
<option value="pocket">Pocket Option</option>
<option value="binarium">Binarium</option>
</select>
</div>

<div>
<label>Валюта</label>
<select id="currency">
<option value="₴">UAH ₴</option>
<option value="$">USD $</option>
<option value="€">EUR €</option>
<option value="zł">PLN zł</option>
</select>
</div>

<div>
<label>Початковий баланс</label>
<input type="number" id="start">
</div>

<div>
<label>Ціль</label>
<input type="number" id="goal">
</div>

<div>
<label>Днів</label>
<input type="number" id="days">
</div>

<div>
<label>Payout %</label>
<input type="number" id="payout" value="80">
</div>

</div>

<div class="actions">
<button class="mainBtn" onclick="createPlan()">Створити план</button>
<button class="grayBtn" onclick="logout()">Вийти</button>
</div>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Денний %</div>
</div>

<div class="box">
<div class="big blue" id="profitDay">0</div>
<div>Прибуток / день</div>
</div>

<div class="box">
<div class="big gold" id="nowbal">0</div>
<div>Баланс</div>
</div>

<div class="box">
<div class="big gold" id="left">0</div>
<div>Лишилось днів</div>
</div>

</div>

<div class="progressWrap">
<div class="progress" id="bar"></div>
</div>

<div class="progressText" id="progText">0% до цілі</div>

<div class="section">План</div>
<div class="dayList" id="planRows"></div>

<footer>
Trade Cuberz © 2026
</footer>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAkRcrT1tBpKTePz00ySBwCx4LhWTL9Umk",
authDomain: "trade-cuberz.firebaseapp.com",
databaseURL: "https://trade-cuberz-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "trade-cuberz",
storageBucket: "trade-cuberz.firebasestorage.app",
messagingSenderId: "750359203953",
appId: "1:750359203953:web:8f8dec225e9f655cdb0bd0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

let userId="";
let current=0,target=0,totalDays=0,doneDays=0,rate=0;

onAuthStateChanged(auth, async(user)=>{

if(user){

userId=user.uid;

userBox.innerHTML=`
<img src="${user.photoURL}">
<div>${user.displayName}</div>
`;

loadData();

}else{

await signInWithPopup(auth,provider);

}

});

async function saveData(){

await set(ref(db,"users/"+userId),{
broker:broker.value,
currency:currency.value,
start:start.value,
goal:goal.value,
days:days.value,
payout:payout.value,
current,
doneDays
});

}

async function loadData(){

const snap = await get(ref(db,"users/"+userId));

if(snap.exists()){

let d=snap.val();

broker.value=d.broker||"pocket";
currency.value=d.currency||"₴";
start.value=d.start||"";
goal.value=d.goal||"";
days.value=d.days||"";
payout.value=d.payout||80;
current=d.current||0;
doneDays=d.doneDays||0;

if(current>0){
target=Number(goal.value);
totalDays=Number(days.value);
renderAll();
}

}

}

window.createPlan=function(){

current=Number(start.value)||0;
target=Number(goal.value)||0;
totalDays=Number(days.value)||0;
doneDays=0;

renderAll();
saveData();

}

function renderAll(){

let leftDays=Math.max(totalDays-doneDays,1);

rate=(Math.pow(target/current,1/leftDays)-1)*100;

let dayProfit=current*(rate/100);

daily.innerText=rate.toFixed(2)+"%";
profitDay.innerText=Math.round(dayProfit);
nowbal.innerText=Math.round(current);
left.innerText=totalDays-doneDays;

let progress=(current/target)*100;
if(progress>100)progress=100;

bar.style.width=progress+"%";
progText.innerText=progress.toFixed(1)+"% до цілі";

renderPlan();
saveData();

}

function renderPlan(){

let html="";
let bal=current;

for(let i=doneDays+1;i<=totalDays;i++){

bal=bal*(1+rate/100);

html+=`
<div class="dayCard">

<div class="row">
<div><b>День ${i}</b></div>
<div>${Math.round(bal)}</div>
</div>

<input class="smallInput" id="real${i}" placeholder="Баланс або -збиток">

<button class="dayBtn" onclick="finishDay(${i})">Закрити день</button>

</div>
`;
}

planRows.innerHTML=html;

}

window.finishDay=function(day){

let val=document.getElementById("real"+day).value.trim();

if(val==="") return;

let num=Number(val);

if(num<0){
current=current+num;
}else{
current=num;
}

doneDays++;

renderAll();

}

window.logout=function(){
signOut(auth);
}

</script>

</body>
</html>
