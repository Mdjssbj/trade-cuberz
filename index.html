<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRADE CUBERZ</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

:root{
--bg1:#07111f;
--bg2:#0e1b34;
--card:#0e1a39;
--card2:#142448;
--text:#ffffff;
--muted:#95a7d3;
}

body.light{
--bg1:#edf3ff;
--bg2:#dfe8ff;
--card:#ffffff;
--card2:#f5f8ff;
--text:#111;
--muted:#52617e;
}

body{
background:linear-gradient(135deg,var(--bg1),var(--bg2));
min-height:100vh;
padding:20px;
color:var(--text);
transition:.3s;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:rgba(255,255,255,.03);
padding:28px;
border-radius:24px;
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(12px);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.logo{
font-size:48px;
font-weight:900;
background:linear-gradient(90deg,#18f58b,#2f78ff,#9f2dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
margin-top:8px;
color:var(--muted);
font-size:22px;
}

.rightTop{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.telegram,.themeBtn{
text-decoration:none;
padding:14px 22px;
border-radius:14px;
font-weight:800;
border:none;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#2f78ff,#6a4dff);
}

.themeBtn{
background:#253762;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

label{
display:block;
margin-bottom:7px;
font-size:14px;
color:var(--muted);
}

input,select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:var(--card2);
color:var(--text);
font-size:17px;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-top:18px;
}

button.mainBtn{
padding:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:900;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#2f78ff,#982cff);
}

button.grayBtn{
padding:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:900;
cursor:pointer;
color:#fff;
background:#24345f;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:24px;
}

.box{
background:var(--card);
padding:22px;
border-radius:20px;
text-align:center;
}

.big{
font-size:34px;
font-weight:900;
margin-bottom:8px;
}

.green{color:#18f58b;}
.blue{color:#39c3ff;}
.gold{color:#ffd84d;}

.progressWrap{
margin-top:20px;
height:18px;
background:#10204a;
border-radius:30px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#18f58b,#2f78ff);
transition:.5s;
}

.progressText{
margin-top:10px;
color:var(--muted);
font-size:14px;
}

.warn{
margin-top:18px;
padding:16px;
border-radius:16px;
background:#451d25;
color:#ff7a7a;
font-weight:800;
}

.dayList,.historyList{
display:grid;
gap:12px;
margin-top:22px;
}

.dayCard,.historyCard{
background:var(--card);
padding:18px;
border-radius:18px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.smallInput{
padding:12px;
margin-top:8px;
}

.dayBtn{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:800;
color:#fff;
background:linear-gradient(90deg,#2f78ff,#982cff);
cursor:pointer;
}

.sectionTitle{
margin-top:26px;
margin-bottom:10px;
font-size:20px;
font-weight:900;
}

footer{
margin-top:35px;
text-align:center;
color:var(--muted);
font-size:26px;
padding:20px;
}

@media(max-width:600px){
.logo{font-size:34px}
.sub{font-size:18px}
footer{font-size:18px}
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Професійний торговий калькулятор</div>
</div>

<div class="rightTop">
<button class="themeBtn" onclick="toggleTheme()">🌙 / ☀️</button>
<a class="telegram" href="https://t.me/+JxZLoij59XBmNTBi" target="_blank">Telegram</a>
</div>
</div>

<div class="grid">

<div>
<label>Брокер</label>
<select id="broker">
<option value="pocket">Pocket Option</option>
<option value="binarium">Binarium</option>
</select>
</div>

<div>
<label>Валюта</label>
<select id="currency">
<option value="₴">UAH ₴</option>
<option value="$">USD $</option>
<option value="€">EUR €</option>
<option value="zł">PLN zł</option>
</select>
</div>

<div>
<label>Початковий баланс</label>
<input type="number" id="start">
</div>

<div>
<label>Ціль</label>
<input type="number" id="goal">
</div>

<div>
<label>Кількість днів</label>
<input type="number" id="days">
</div>

<div>
<label>Payout %</label>
<input type="number" id="payout" value="80">
</div>

</div>

<div class="actions">
<button class="mainBtn" onclick="createPlan()">Створити план</button>
<button class="grayBtn" onclick="resetAll()">Очистити</button>
</div>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Денний %</div>
</div>

<div class="box">
<div class="big blue" id="profitDay">0</div>
<div>Прибуток / день</div>
</div>

<div class="box">
<div class="big gold" id="nowbal">0</div>
<div>Баланс</div>
</div>

<div class="box">
<div class="big gold" id="left">0</div>
<div>Лишилось днів</div>
</div>

</div>

<div class="progressWrap">
<div class="progress" id="bar"></div>
</div>

<div class="progressText" id="progText">0% до цілі</div>

<div id="warnBox"></div>

<div class="sectionTitle">План по днях</div>
<div class="dayList" id="planRows"></div>

<div class="sectionTitle">Мій шлях</div>
<div class="historyList" id="historyRows"></div>

<footer>
Trade Cuberz © 2026
</footer>

</div>
</div>

<script>
let current=0,target=0,totalDays=0,doneDays=0,rate=0;
let history=[];

function c(){
return currency.value;
}

function round(n){
return Math.round(n);
}

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("theme",
document.body.classList.contains("light")?"light":"dark");
}

function loadTheme(){
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}
}

function minTrade(){
let b=broker.value;
let cur=currency.value;

if(cur==="₴"){
if(b==="pocket") return 50;
if(b==="binarium") return 25;
}
if(cur==="$") return 1;
if(cur==="€") return 1;
if(cur==="zł") return 5;

return 1;
}

function save(){
localStorage.setItem("tradeFinal",JSON.stringify({
broker:broker.value,
currency:currency.value,
start:start.value,
goal:goal.value,
days:days.value,
payout:payout.value,
history:history,
current:current,
doneDays:doneDays
}));
}

function load(){
let d=JSON.parse(localStorage.getItem("tradeFinal")||"{}");

broker.value=d.broker||"pocket";
currency.value=d.currency||"₴";
start.value=d.start||"";
goal.value=d.goal||"";
days.value=d.days||"";
payout.value=d.payout||80;

history=d.history||[];
current=d.current||0;
doneDays=d.doneDays||0;

if(current>0){
target=Number(goal.value)||0;
totalDays=Number(days.value)||0;
renderAll();
renderHistory();
}
}

function resetAll(){
localStorage.clear();
location.reload();
}

function createPlan(){

current=Number(start.value)||0;
target=Number(goal.value)||0;
totalDays=Number(days.value)||0;
doneDays=0;
history=[];

renderAll();
save();
}

function renderAll(){

if(current<=0||target<=0||totalDays<=0)return;

let leftDays=Math.max(totalDays-doneDays,1);

rate=(Math.pow(target/current,1/leftDays)-1)*100;

let dayProfit=current*(rate/100);

daily.innerText=rate.toFixed(2)+"%";
profitDay.innerText=c()+round(dayProfit);
nowbal.innerText=c()+round(current);
left.innerText=totalDays-doneDays;

let progress=(current/target)*100;
if(progress>100)progress=100;

bar.style.width=progress+"%";
progText.innerText=progress.toFixed(1)+"% до цілі";

renderPlan();
renderHistory();
save();
}

function renderPlan(){

let html="";
let bal=current;

let payoutVal=(Number(payout.value)||80)/100;
let min=minTrade();
let warning=false;

for(let i=doneDays+1;i<=totalDays;i++){

bal=bal*(1+rate/100);

let raw=current*0.02;
let stake=Math.max(raw,min);

if(raw<min)warning=true;

let profit=stake*payoutVal;
let trades=Math.ceil((current*(rate/100))/profit);

html+=`
<div class="dayCard">

<div class="row">
<div><b>День ${i}</b></div>
<div class="gold">${c()}${round(bal)}</div>
</div>

<div class="row">
<div>Ставка:</div>
<div>${c()}${round(stake)}</div>
</div>

<div class="row">
<div>Угод сьогодні:</div>
<div class="green">${trades}</div>
</div>

<input class="smallInput" id="real${i}" placeholder="Введи баланс або -збиток">

<button class="dayBtn" onclick="finishDay(${i})">Закрити день</button>

</div>
`;
}

planRows.innerHTML=html;

warnBox.innerHTML=
warning?'<div class="warn">Баланс малий для точних ставок %. Використано мінімальну ставку брокера.</div>':'';
}

function finishDay(day){

let val=document.getElementById("real"+day).value.trim();

if(val==="") return;

let num=Number(val);

if(isNaN(num)) return;

if(num<0){
current=current+num;
}else{
current=num;
}

if(current<1) current=1;

history.push({
day:day,
input:val,
balance:round(current)
});

doneDays++;

renderAll();
}

function renderHistory(){

let html="";

if(history.length===0){
html='<div class="historyCard">Історія поки порожня</div>';
historyRows.innerHTML=html;
return;
}

for(let i=0;i<history.length;i++){

html+=`
<div class="historyCard">

<div class="row">
<div><b>День ${history[i].day}</b></div>
<div class="gold">${c()}${history[i].balance}</div>
</div>

<div class="row">
<div>Що ввів:</div>
<div>${history[i].input}</div>
</div>

</div>
`;
}

historyRows.innerHTML=html;
}

loadTheme();
load();
</script>

</body>
</html>
