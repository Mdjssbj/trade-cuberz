<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRADE CUBERZ</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#07111f,#0d1730,#132247);
min-height:100vh;
padding:20px;
color:#fff;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:rgba(255,255,255,.04);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.06);
padding:28px;
border-radius:24px;
box-shadow:0 0 30px rgba(0,0,0,.35);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.logo{
font-size:48px;
font-weight:900;
background:linear-gradient(90deg,#18f58b,#2f78ff,#9d2dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#90a4d4;
margin-top:8px;
font-size:22px;
}

.telegram{
text-decoration:none;
padding:14px 24px;
border-radius:14px;
font-weight:800;
background:linear-gradient(90deg,#2f78ff,#6f4bff);
color:#fff;
transition:.25s;
}

.telegram:hover{
transform:translateY(-2px);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

label{
display:block;
margin-bottom:7px;
font-size:14px;
color:#9db0da;
}

input,select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:#192746;
color:#fff;
font-size:17px;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-top:18px;
}

button{
padding:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:900;
cursor:pointer;
color:#fff;
transition:.25s;
}

.btn1{
background:linear-gradient(90deg,#2f78ff,#982cff);
}

.btn2{
background:#24345f;
}

button:hover{
transform:translateY(-2px);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:24px;
}

.box{
background:#09173a;
padding:22px;
border-radius:20px;
text-align:center;
}

.big{
font-size:34px;
font-weight:900;
margin-bottom:8px;
}

.green{color:#18f58b;}
.blue{color:#3ec3ff;}
.gold{color:#ffd84d;}

.progressWrap{
margin-top:20px;
height:18px;
border-radius:30px;
overflow:hidden;
background:#10204a;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#18f58b,#2f78ff);
transition:.6s;
}

.progressText{
margin-top:10px;
font-size:14px;
color:#9db0da;
}

.table{
margin-top:22px;
display:grid;
gap:12px;
}

.dayCard{
background:#0e1a39;
padding:18px;
border-radius:18px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:12px;
}

.small{
padding:12px;
margin-top:8px;
}

.warn{
margin-top:18px;
padding:15px;
border-radius:16px;
background:#381a22;
color:#ff7272;
font-weight:800;
}

footer{
margin-top:28px;
text-align:center;
color:#7d90b9;
font-size:14px;
}

@media(max-width:600px){
.logo{font-size:34px}
.sub{font-size:18px}
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Професійний торговий калькулятор</div>
</div>

<a class="telegram" target="_blank"
href="https://t.me/+JxZLoij59XBmNTBi">Telegram</a>
</div>

<div class="grid">

<div>
<label>Брокер</label>
<select id="broker">
<option value="pocket">Pocket Option</option>
<option value="binarium">Binarium</option>
</select>
</div>

<div>
<label>Валюта</label>
<select id="currency">
<option value="₴">UAH ₴</option>
<option value="$">USD $</option>
<option value="€">EUR €</option>
<option value="zł">PLN zł</option>
</select>
</div>

<div>
<label>Початковий баланс</label>
<input type="number" id="start">
</div>

<div>
<label>Ціль</label>
<input type="number" id="goal">
</div>

<div>
<label>Кількість днів</label>
<input type="number" id="days">
</div>

<div>
<label>Payout %</label>
<input type="number" id="payout" value="80">
</div>

</div>

<div class="actions">
<button class="btn1" onclick="createPlan()">Створити план</button>
<button class="btn2" onclick="resetAll()">Очистити</button>
</div>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Денний %</div>
</div>

<div class="box">
<div class="big blue" id="profitDay">0</div>
<div>Прибуток / день</div>
</div>

<div class="box">
<div class="big gold" id="nowbal">0</div>
<div>Баланс</div>
</div>

<div class="box">
<div class="big gold" id="left">0</div>
<div>Лишилось днів</div>
</div>

</div>

<div class="progressWrap">
<div class="progress" id="bar"></div>
</div>

<div class="progressText" id="progText">0% до цілі</div>

<div id="warnBox"></div>

<div class="table" id="planRows"></div>

<footer>
TRADE CUBERZ
</footer>

</div>
</div>

<script>
let current=0,target=0,totalDays=0,doneDays=0,rate=0;

function c(){
return document.getElementById("currency").value;
}

function round(n){
return Math.round(n);
}

function save(){
localStorage.setItem("tradepro",JSON.stringify({
broker:broker.value,
currency:currency.value,
start:start.value,
goal:goal.value,
days:days.value,
payout:payout.value
}));
}

function load(){
let d=JSON.parse(localStorage.getItem("tradepro")||"{}");
broker.value=d.broker||"pocket";
currency.value=d.currency||"₴";
start.value=d.start||"";
goal.value=d.goal||"";
days.value=d.days||"";
payout.value=d.payout||80;
}

function resetAll(){
localStorage.clear();
location.reload();
}

function minTrade(){

let b=broker.value;
let cur=currency.value;

if(cur==="₴"){
if(b==="pocket") return 50;
if(b==="binarium") return 25;
}

if(cur==="$") return 1;
if(cur==="€") return 1;
if(cur==="zł") return 5;

return 1;
}

function createPlan(){

save();

current=Number(start.value)||0;
target=Number(goal.value)||0;
totalDays=Number(days.value)||0;
doneDays=0;

renderAll();
}

function renderAll(){

if(current<=0||target<=0||totalDays<=0)return;

let leftDays=Math.max(totalDays-doneDays,1);

rate=(Math.pow(target/current,1/leftDays)-1)*100;

let dayProfit=current*(rate/100);

daily.innerText=rate.toFixed(2)+"%";
profitDay.innerText=c()+round(dayProfit);
nowbal.innerText=c()+round(current);
left.innerText=totalDays-doneDays;

let progress=(current/target)*100;
if(progress>100)progress=100;

bar.style.width=progress+"%";
progText.innerText=progress.toFixed(1)+"% до цілі";

renderPlan();
}

function renderPlan(){

let html="";
let bal=current;
let min=minTrade();
let payoutValue=(Number(payout.value)||80)/100;
let warn=false;

for(let i=doneDays+1;i<=totalDays;i++){

bal=bal*(1+rate/100);

let raw=current*(0.02);
let stake=Math.max(raw,min);
if(raw<min)warn=true;

let profit=stake*payoutValue;
let trades=Math.ceil((current*(rate/100))/profit);

html+=`
<div class="dayCard">

<div class="row">
<div><b>День ${i}</b></div>
<div class="gold">${c()}${round(bal)}</div>
</div>

<div class="row">
<div>Ставка:</div>
<div>${c()}${round(stake)}</div>
</div>

<div class="row">
<div>Угод до цілі:</div>
<div class="green">${trades}</div>
</div>

<input class="small" id="real${i}" placeholder="Введи баланс або -збиток">

<button class="btn1 small" onclick="finishDay(${i})">
Закрити день
</button>

</div>
`;
}

planRows.innerHTML=html;

warnBox.innerHTML=
warn?'<div class="warn">Баланс малий для точних ставок %. Використано мінімальну ставку брокера.</div>':'';
}

function finishDay(day){

let val=document.getElementById("real"+day).value.trim();

if(val==="")return;

let num=Number(val);

if(isNaN(num))return;

if(num<0){
current=current+num;
}else{
current=num;
}

if(current<1) current=1;

doneDays++;

renderAll();
}

load();
</script>

</body>
</html>
