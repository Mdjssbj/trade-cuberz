<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trade Cuberz Full Smart</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#050816,#091121,#111a35);
color:#fff;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:#11192d;
padding:28px;
border-radius:22px;
margin-bottom:22px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.logo{
font-size:46px;
font-weight:800;
color:#18f58b;
}

.sub{
color:#8ea3d8;
margin-top:6px;
font-size:16px;
}

.tg{
background:#2f78ff;
color:#fff;
padding:14px 22px;
border-radius:14px;
font-weight:700;
text-decoration:none;
}

.grid2{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

@media(max-width:900px){
.grid2{grid-template-columns:1fr;}
}

label{
display:block;
margin-bottom:8px;
color:#90a6db;
font-size:15px;
}

input{
width:100%;
padding:16px;
font-size:24px;
border:none;
outline:none;
border-radius:14px;
background:#222c42;
color:#fff;
margin-bottom:15px;
appearance:none;
-moz-appearance:textfield;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
-webkit-appearance:none;
margin:0;
}

.quick{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.quick button,
button{
padding:15px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
font-size:18px;
color:#fff;
}

.quick button{
flex:1;
min-width:100px;
}

.b1{background:#2f78ff;}
.b2{background:#20b14d;}
.b3{background:#8a2dff;}

.mainbtn{
background:linear-gradient(90deg,#2f78ff,#8a2dff);
width:100%;
}

.greenbtn{
background:#18a84c;
width:100%;
}

.redbtn{
background:#e43d3d;
width:100%;
}

.scheme{
background:#0b1328;
padding:22px;
border-radius:18px;
}

.scheme h3{margin-bottom:12px;}
.scheme p{color:#9ab1e7;line-height:1.6;margin-bottom:14px;}

.bar{
height:10px;
border-radius:50px;
background:linear-gradient(90deg,#ff4747,#ff9a00,#ffd84d,#38b6ff);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:16px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.05);
}

th{
color:#9ab1e7;
font-size:14px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:18px;
}

.box{
background:#0b1328;
padding:20px;
border-radius:18px;
text-align:center;
}

.big{
font-size:34px;
font-weight:800;
margin-bottom:8px;
}

.green{color:#18f58b;}
.red{color:#ff5757;}
.gold{color:#ffd84d;}
.blue{color:#38b6ff;}

.footer{
text-align:center;
color:#7d8cb8;
padding:12px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">Професійний торговий калькулятор</div>
</div>

<a class="tg" href="https://t.me/+JxZLoij59XBmNTBi" target="_blank">Telegram</a>
</div>
</div>

<div class="card">
<div class="grid2">

<div>
<label>Загальна сума</label>
<input type="number" id="sum" value="1000" placeholder="Введіть баланс $" oninput="renderCalc()">

<div class="quick">
<button class="b1" onclick="setBal(100)">$100</button>
<button class="b2" onclick="setBal(500)">$500</button>
<button class="b3" onclick="setBal(1000)">$1000</button>
</div>
</div>

<div class="scheme">
<h3>Схема розподілу</h3>
<p>1% → 1.5% → 3.5% → 8% → 20% → 60%</p>
<div class="bar"></div>
</div>

</div>

<table>
<thead>
<tr>
<th>СТУПІНЬ</th>
<th>ПРОЦЕНТ</th>
<th>СУМА</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

<div class="card">
<h2 style="margin-bottom:18px;">Планувальник цілей</h2>

<label>Початкова сума ($)</label>
<input type="number" id="start" placeholder="200">

<label>Цільова сума ($)</label>
<input type="number" id="goal" placeholder="600">

<label>Кількість днів</label>
<input type="number" id="days" placeholder="21">

<button class="mainbtn" onclick="makePlan()">Розрахувати план</button>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Щоденний % росту</div>
</div>

<div class="box">
<div class="big blue" id="done">0</div>
<div>Виконано днів</div>
</div>

<div class="box">
<div class="big gold" id="left">0</div>
<div>Залишилось днів</div>
</div>

<div class="box">
<div class="big gold" id="prog">0%</div>
<div>Прогрес</div>
</div>

</div>

<div style="margin-top:20px;" class="grid2">

<div>
<button class="greenbtn" onclick="winDay()">+ День виконано</button>
</div>

<div>
<input type="number" id="loss" placeholder="Сума збитку $">
<button class="redbtn" onclick="lossDay()" style="margin-top:10px;">- Мінусовий день</button>
</div>

</div>

</div>

<div class="footer">
Trade Cuberz Full Smart © 2026
</div>

</div>

<script>
const perc=[1,1.5,3.5,8,20,60];

let current=0;
let target=0;
let totalDays=0;
let doneDays=0;

function setBal(v){
document.getElementById("sum").value=v;
renderCalc();
}

function renderCalc(){
let s=parseFloat(document.getElementById("sum").value)||0;
let html="";

for(let i=0;i<perc.length;i++){
let val=(s*perc[i]/100).toFixed(2);

html+=`
<tr>
<td class="green">${i+1} ступінь</td>
<td>${perc[i]}%</td>
<td class="gold">$${val}</td>
</tr>
`;
}

document.getElementById("rows").innerHTML=html;
}

function updateStats(){

let left=Math.max(totalDays-doneDays,0);
let prog=((doneDays/totalDays)*100)||0;

document.getElementById("done").innerText=doneDays;
document.getElementById("left").innerText=left;
document.getElementById("prog").innerText=prog.toFixed(1)+"%";

if(left>0 && current>0 && target>0){
let rate=(Math.pow(target/current,1/left)-1)*100;
document.getElementById("daily").innerText=rate.toFixed(3)+"%";
}else{
document.getElementById("daily").innerText="0%";
}
}

function makePlan(){

current=parseFloat(document.getElementById("start").value)||0;
target=parseFloat(document.getElementById("goal").value)||0;
totalDays=parseInt(document.getElementById("days").value)||0;
doneDays=0;

updateStats();
}

function winDay(){

if(totalDays==0)return;

let rate=parseFloat(document.getElementById("daily").innerText)||0;
current=current*(1+rate/100);
doneDays++;

updateStats();
}

function lossDay(){

let loss=parseFloat(document.getElementById("loss").value)||0;

if(totalDays==0)return;

current=current-loss;
if(current<1)current=1;

doneDays++;

document.getElementById("loss").value="";

updateStats();
}

renderCalc();
</script>

</body>
</html>
