<script>
/* ЗАМІНИ свою функцію renderSteps() на цю */

function renderSteps(){

let payout=(parseFloat(document.getElementById("payout").value)||80)/100;
let min=minTrade();
let dayGoal=current*(rate/100);

let html="";

for(let i=0;i<levels.length;i++){

let raw=current*(levels[i]/100);
let stake=raw<min ? min : raw;

let profit=stake*payout;
let trades=Math.ceil(dayGoal/profit);

let note="";
let needBalance=Math.ceil(min/(levels[i]/100));

if(raw<min){
note=` (мін.)`;
}

html+=`
<tr>
<td>${i+1}</td>
<td>${levels[i]}%</td>
<td class="gold">${cur()}${Math.round(stake)}${note}</td>
<td class="green">${trades}</td>
</tr>
`;

}

/* Попередження зверху */

let warn="";

if(current < 5000 && cur()=="₴"){
warn=`
<div style="
margin-top:15px;
padding:14px;
border-radius:14px;
background:#2b1720;
color:#ff6a6a;
font-weight:700;
">
Баланс малий для точних 1% ставок. Брокер застосував мінімальні угоди.
</div>
`;
}else{
warn="";
}

document.getElementById("stepsRows").innerHTML=html;
document.getElementById("stepsRows").insertAdjacentHTML("beforebegin",warn);

}
</script>
