<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trade Cuberz v7 Real Tracker</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
background:linear-gradient(135deg,#050816,#091121,#111a35);
color:#fff;
padding:20px;
}
.container{max-width:1200px;margin:auto}
.card{
background:#11192d;
padding:28px;
border-radius:22px;
margin-bottom:22px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}
.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}
.logo{
font-size:46px;
font-weight:800;
color:#18f58b;
}
.sub{color:#8ea3d8;margin-top:6px}
.tg{
background:#2f78ff;
padding:14px 24px;
border-radius:14px;
text-decoration:none;
color:#fff;
font-weight:700;
}
label{
display:block;
margin-bottom:8px;
color:#8ea3d8;
font-size:15px;
}
input,select{
width:100%;
padding:14px;
font-size:18px;
border:none;
outline:none;
border-radius:14px;
background:#222c42;
color:#fff;
margin-bottom:12px;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#2f78ff,#8a2dff);
}
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}
@media(max-width:900px){
.grid2{grid-template-columns:1fr}
.logo{font-size:36px}
}
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
margin-top:18px;
}
.box{
background:#0b1328;
padding:18px;
border-radius:18px;
text-align:center;
}
.big{
font-size:30px;
font-weight:800;
margin-bottom:8px;
}
.green{color:#18f58b}
.gold{color:#ffd84d}
.blue{color:#38b6ff}
.red{color:#ff5f5f}
table{
width:100%;
border-collapse:collapse;
margin-top:18px;
}
th,td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.05);
vertical-align:middle;
}
th{
font-size:14px;
color:#9ab1e7;
}
.smallInput{
width:130px;
padding:10px;
font-size:16px;
margin:0;
}
.doneRow{
background:rgba(24,245,139,.08);
}
.footer{
text-align:center;
color:#7d8cb8;
padding:12px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<div class="top">
<div>
<div class="logo">TRADE CUBERZ</div>
<div class="sub">v7 Real Tracker</div>
</div>
<a class="tg" href="https://t.me/+JxZLoij59XBmNTBi" target="_blank">Telegram</a>
</div>
</div>

<div class="card">

<div class="grid2">

<div>
<label>Валюта</label>
<select id="currency">
<option value="₴">UAH</option>
<option value="$">USD</option>
<option value="€">EUR</option>
<option value="zł">PLN</option>
</select>
</div>

<div>
<label>Брокер</label>
<select id="broker">
<option>Pocket Option</option>
<option>Binarium</option>
</select>
</div>

</div>

<label>Початковий баланс</label>
<input type="number" id="start" value="4000">

<label>Ціль</label>
<input type="number" id="goal" value="10000">

<label>Кількість днів</label>
<input type="number" id="days" value="20">

<button onclick="createPlan()">Створити план</button>

<div class="stats">

<div class="box">
<div class="big green" id="daily">0%</div>
<div>Денний %</div>
</div>

<div class="box">
<div class="big blue" id="done">0</div>
<div>Виконано</div>
</div>

<div class="box">
<div class="big gold" id="left">0</div>
<div>Лишилось</div>
</div>

<div class="box">
<div class="big gold" id="nowbal">0</div>
<div>Поточний баланс</div>
</div>

</div>

<table>
<thead>
<tr>
<th>День</th>
<th>Очікувано</th>
<th>Реальний баланс</th>
<th>✔</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

<div class="footer">
Trade Cuberz v7 © 2026
</div>

</div>

<script>
let current=0;
let target=0;
let totalDays=0;
let doneDays=0;
let rate=0;

function cur(){
return document.getElementById("currency").value;
}

function createPlan(){

current=parseFloat(document.getElementById("start").value)||0;
target=parseFloat(document.getElementById("goal").value)||0;
totalDays=parseInt(document.getElementById("days").value)||0;
doneDays=0;

renderPlan();
}

function renderPlan(){

let left=Math.max(totalDays-doneDays,1);

rate=(Math.pow(target/current,1/left)-1)*100;

document.getElementById("daily").innerText=rate.toFixed(2)+"%";
document.getElementById("done").innerText=doneDays;
document.getElementById("left").innerText=totalDays-doneDays;
document.getElementById("nowbal").innerText=cur()+Math.round(current);

let html="";
let bal=current;

for(let i=doneDays+1;i<=totalDays;i++){

bal=bal*(1+rate/100);

html+=`
<tr id="row${i}">
<td>День ${i}</td>
<td class="gold">${cur()}${Math.round(bal)}</td>
<td>
<input class="smallInput" type="number" id="real${i}" placeholder="Факт">
</td>
<td>
<input type="checkbox" onchange="finishDay(${i},this)">
</td>
</tr>
`;
}

document.getElementById("rows").innerHTML=html;
}

function finishDay(day,box){

if(!box.checked)return;

let real=parseFloat(document.getElementById("real"+day).value)||0;

if(real<=0){
alert("Введи реальний баланс");
box.checked=false;
return;
}

current=real;
doneDays++;

document.getElementById("row"+day).classList.add("doneRow");

renderPlan();
}

createPlan();
</script>

</body>
</html>
